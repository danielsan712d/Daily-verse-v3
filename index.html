<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Word | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        /* Color variables for easy switching */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1a2a6c;
            --text-sub: #555555;
            --accent: #b38728;
            --btn-bg: #1a2a6c;
            --btn-text: #ffffff;
        }

        /* Dark Mode colors */
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #bbbbbb;
            --accent: #d4af37;
            --btn-bg: #d4af37;
            --btn-text: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* The Main Card */
        .container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 700px;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            transition: background-color 0.3s ease;
        }

        /* Toggle Button Position */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--accent);
        }

        /* The Cross */
        .cross {
            width: 8px;
            height: 40px;
            background: var(--accent);
            margin: 0 auto 30px;
            position: relative;
        }
        .cross::after {
            content: "";
            width: 26px;
            height: 8px;
            background: var(--accent);
            position: absolute;
            top: 10px;
            left: -9px;
        }

        #verse {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        #ref {
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            display: block;
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 15px 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 5px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            #verse { font-size: 1.5rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

        <div class="cross"></div>
        
        <div id="verse">"Loading..."</div>
        <div id="ref">Scripture</div>

        <button class="btn" onclick="getNewVerse()">Next Verse</button>
    </div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('themeBtn');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '☀️';
            }
        }

        // Bible Verse Logic
        const verseList = ["John 3:16", "Psalm 23:1", "Romans 8:28", "Proverbs 3:5", "Philippians 4:13", "Isaiah 40:31"];

        async function getNewVerse() {
            const randomPick = verseList[Math.floor(Math.random() * verseList.length)];
            try {
                const response = await fetch(`https://bible-api.com/${randomPick}`);
                const data = await response.json();
                document.getElementById('verse').innerText = `"${data.text.trim()}"`;
                document.getElementById('ref').innerText = data.reference;
            } catch (e) {
                document.getElementById('verse').innerText = "The Lord is my Shepherd.";
                document.getElementById('ref').innerText = "Psalm 23:1";
            }
        }

        // Load first verse on start
        getNewVerse();
    </script>
</body>
</html>

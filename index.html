<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Verse | Official Source</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .verse-box {
            background: white;
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
            border: 1px solid #ddd;
        }
        h1 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        #text { font-size: 24px; color: #222; line-height: 1.5; margin-bottom: 20px; }
        #ref { font-weight: bold; color: #555; font-style: italic; }
    </style>
</head>
<body>

    <div class="verse-box">
        <h1>Holy Bible</h1>
        <div id="text">Loading scripture...</div>
        <div id="ref"></div>
    </div>

    <script>
        // Using a reliable, open-access API
        fetch('https://bible-api.com/john+3:16')
            .then(response => response.json())
            .then(data => {
                document.getElementById('text').innerText = `"${data.text.trim()}"`;
                document.getElementById('ref').innerText = data.reference;
            })
            .catch(err => {
                document.getElementById('text').innerText = "For God so loved the world, that he gave his only begotten Son.";
                document.getElementById('ref').innerText = "John 3:16";
            });
    </script>
</body>
</html>

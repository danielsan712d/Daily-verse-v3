<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Scripture | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #1a2a6c;
            --gold: #b38728;
            --parchment: #fdfbf7;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #121212;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cross {
            width: 12px;
            height: 60px;
            background: var(--gold);
            margin: 0 auto 30px;
            position: relative;
            border-radius: 2px;
        }
        .cross::after {
            content: "";
            width: 40px;
            height: 12px;
            background: var(--gold);
            position: absolute;
            top: 15px;
            left: -14px;
            border-radius: 2px;
        }

        .main-container {
            background: var(--parchment);
            padding: 4rem;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 900px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }

        #verse-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.3;
            color: var(--navy);
            margin-bottom: 2rem;
        }

        #ref {
            font-weight: 600;
            color: var(--gold);
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 3rem;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--navy);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .share-btn {
            background-color: transparent;
            color: var(--navy);
            border: 2px solid var(--navy);
        }

        button:hover {
            background-color: #2a3a7c;
            color: white;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #777;
            border-top: 1px solid #ddd;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #translation-label {
            font-weight: 600;
            color: #aaa;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .main-container { padding: 2.5rem 1.5rem; width: 90%; }
            #verse-text { font-size: 1.8rem; }
            .btn-group { flex-direction: column; }
            footer { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="cross"></div>
        
        <div id="verse-text">"Loading the Word..."</div>
        <div id="ref">Scripture</div>

        <div class="btn-group">
            <button onclick="getNewVerse()">Next Verse</button>
            <button class="share-btn" onclick="copyVerse()">Share Word</button>
        </div>

        <footer>
            <span>Official Portal &bull; 2026</span>
            <span id="translation-label">VERSION: WEB</span>
        </footer>
    </div>

    <script>
        const verses = ["John 3:16", "Romans 8:28", "Psalm 23:1", "Proverbs 3:5", "Philippians 4:13", "Isaiah 40:31", "Joshua 1:9", "Matthew 11:28", "1 Corinthians 13:4"];
        
        async function getNewVerse() {
            const randomPick = verses[Math.floor(Math.random() * verses.length)];
            try {
                const response = await fetch(`https://bible-api.com/${randomPick}`);
                const data = await response.json();
                
                document.getElementById('verse-text').innerText = `"${data.text.trim()}"`;
                document.getElementById('ref').innerText = data.reference;
                document.getElementById('translation-label').innerText = "VERSION: " + data.translation_name;
                
            } catch (e) {
                document.getElementById('verse-text').innerText = "The Lord is my shepherd; I shall not want.";
                document.getElementById('ref').innerText = "Psalm 23:1";
                document.getElementById('translation-label').innerText = "VERSION: WEB";
            }
        }

        function copyVerse() {
            const t = document.getElementById('verse-text').innerText;
            const r = document.getElementById('ref').innerText;
            navigator.clipboard.writeText(t + " - " + r);
            alert("Verse copied to clipboard!");
        }

        getNewVerse();
    </script>
</body>
</html>

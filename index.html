<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bread | Official Scripture Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Variables for easy styling */
        :root {
            --gold: #c5a059;
            --navy: #0f172a;
            --parchment: #fcfaf2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #1a1a1a;
            /* Background image with overlay for a professional look */
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                              url('https://images.unsplash.com/photo-1438232992991-995b7058bbb3?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: var(--parchment);
            width: 95%; /* Mobile first: takes up most of the screen */
            max-width: 850px; /* Limits size on big screens */
            padding: 60px 40px;
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Border detail for an official look */
        .main-card::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            pointer-events: none;
        }

        /* The Detailed Cross */
        .cross-container {
            margin-bottom: 40px;
        }
        .cross-vertical {
            width: 8px;
            height: 50px;
            background: var(--gold);
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
        }
        .cross-horizontal {
            width: 34px;
            height: 8px;
            background: var(--gold);
            position: absolute;
            top: 12px;
            left: -13px;
        }

        #verse-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--navy);
            line-height: 1.4;
            margin: 0 auto 25px;
            max-width: 700px;
        }

        #verse-ref {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: block;
        }

        .btn-group {
            display: flex;
            flex-direction: row; /* Desktop side-by-side */
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 16px 35px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 0;
            cursor: pointer;
            transition: 0.4s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .primary-btn {
            background: var(--navy);
            color: white;
            border: none;
        }

        .primary-btn:hover {
            background: var(--gold);
            transform: translateY(-3px);
        }

        .secondary-btn {
            background: transparent;
            color: var(--navy);
            border: 2px solid var(--navy);
        }

        .secondary-btn:hover {
            background: var(--navy);
            color: white;
        }

        footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #999;
            letter-spacing: 1px;
        }

        /* PHONE RESPONSIVENESS */
        @media (max-width: 600px) {
            .main-card {
                padding: 40px 20px;
                width: 90%;
            }
            #verse-text {
                font-size: 1.6rem; /* Smaller text for small screens */
            }
            .btn-group {
                flex-direction: column; /* Stack buttons on top of each other */
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="cross-container">
            <div class="cross-vertical">
                <div class="cross-horizontal"></div>
            </div>
        </div>
        
        <div id="verse-text">"He gives strength to the weary and increases the power of the weak."</div>
        <div id="verse-ref">Isaiah 40:29</div>

        <div class="btn-group">
            <button class="primary-btn" onclick="fetchNewVerse()">Next Scripture</button>
            <button class="secondary-btn" onclick="copyToClipboard()">Share Word</button>
        </div>

        <footer>
            ESTABLISHED 2026 &bull; OFFICIAL DAILY SCRIPTURE
        </footer>
    </div>

    <script>
        const officialVerses = [
            "John 3:16", "Philippians 4:13", "Psalm 23:1", 
            "Proverbs 3:5", "Isaiah 41:10", "Romans 8:28", 
            "Matthew 11:28", "Hebrews 11:1", "Joshua 1:9"
        ];

        async function fetchNewVerse() {
            const textEl = document.getElementById('verse-text');
            const refEl = document.getElementById('verse-ref');
            const randomPick = officialVerses[Math.floor(Math.random() * officialVerses.length)];

            try {
                const response = await fetch(`https://bible-api.com/${randomPick}`);
                const data = await response.json();
                textEl.innerText = `"${data.text.trim()}"`;
                refEl.innerText = data.reference;
            } catch (error) {
                textEl.innerText = "The Lord is my light and my salvation; whom shall I fear?";
                refEl.innerText = "Psalm 27:1";
            }
        }

        function copyToClipboard() {
            const v = document.getElementById('verse-text').innerText;
            const r = document.getElementById('verse-ref').innerText;
            navigator.clipboard.writeText(v + " - " + r);
            alert("Official verse copied!");
        }

        // Initial load
        fetchNewVerse();
    </script>
</body>
</html>

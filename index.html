<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Word | Official Daily Verse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37; /* Gold accent for an official look */
            --text: #333333;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .main-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            border-top: 8px solid var(--primary);
        }

        .official-badge {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: block;
        }

        #verse-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            line-height: 1.5;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        #verse-ref {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: block;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }

        .copy-btn {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .copy-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #95a5a6;
        }

        /* Loading Animation */
        .loading {
            opacity: 0.5;
            filter: blur(2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <span class="official-badge">Scripture of the Day</span>
        
        <div id="content-area">
            <div id="verse-text">"Loading your daily inspiration..."</div>
            <div id="verse-ref">Please wait...</div>
        </div>

        <div class="btn-container">
            <button onclick="window.location.reload()">New Verse</button>
            <button class="copy-btn" onclick="copyVerse()">Copy Verse</button>
        </div>

        <footer>
            Updated Daily • King James Version / WEB
        </footer>
    </div>

    <script>
        // Professional list of verses to ensure it always works
        const topVerses = [
            "John 3:16", "Jeremiah 29:11", "Philippians 4:13", 
            "Psalm 23:1", "Proverbs 3:5", "Romans 8:28", 
            "Isaiah 41:10", "Matthew 6:33", "Joshua 1:9"
        ];

        async function fetchDailyVerse() {
            const textEl = document.getElementById('verse-text');
            const refEl = document.getElementById('verse-ref');
            
            // Pick a random verse from our "official" list
            const randomPick = topVerses[Math.floor(Math.random() * topVerses.length)];

            try {
                const response = await fetch(`https://bible-api.com/${randomPick}`);
                const data = await response.json();

                textEl.innerText = `"${data.text.trim()}"`;
                refEl.innerText = data.reference;
            } catch (error) {
                // Guaranteed fallback if API is down
                textEl.innerText = "The Lord is my shepherd; I shall not want.";
                refEl.innerText = "Psalm 23:1";
            }
        }

        function copyVerse() {
            const text = document.getElementById('verse-text').innerText;
            const ref = document.getElementById('verse-ref').innerText;
            navigator.clipboard.writeText(`${text} - ${ref}`);
            alert("Verse copied to clipboard!");
        }

        // Run the function when the page loads
        fetchDailyVerse();
    </script>
</body>
</html>
